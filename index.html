<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>景品設定管理</title>
  
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#4B6B73">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="設定管理">
  <link rel="apple-touch-icon" href="./icon.svg">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
  <div id="root">
    <div style="text-align:center; padding-top: 40px; color:#8C877C; font-weight:bold;">起動中、、、</div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(err => console.log('SW failed:', err));
      });
    }
  </script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- 定数とアイコン定義 ---
    const MACHINES = ["クレナハイブリッド", "クレナ3Jack", "クレナ3", "クレナマルチ", "ジェミニマルチ", "ジェミニ80", "デカクレ"];
    const COLORS = { magenta: "#4B6B73", textHi: "#2E2C29", textMid: "#8C877C", panel: "#FAFAF8", border: "#E1DED6", danger: "#D9534F" };

    const IconSearch = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
    const IconPlus = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
    const IconChevronLeft = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>;
    const IconSave = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
    const IconTrash = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2-2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;
    const IconDownload = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
    const IconUpload = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;

    // --- メインアプリコンポーネント ---
    function App() {
      const [view, setView] = useState('list');
      const [items, setItems] = useState([]);
      const [searchQuery, setSearchQuery] = useState('');
      
      const [formData, setFormData] = useState({
        id: null, booth: '', machine: MACHINES[0], prize: '', power: '', memo: ''
      });

      useEffect(() => {
        const savedData = localStorage.getItem('crane_app_data');
        if (savedData) setItems(JSON.parse(savedData));
      }, []);

      const saveToLocal = (newItems) => {
        setItems(newItems);
        localStorage.setItem('crane_app_data', JSON.stringify(newItems));
      };

      const handleSave = () => {
        if (!formData.booth || !formData.prize) {
          alert("ブース番号と景品名は必須です！");
          return;
        }
        const timestamp = new Date().toISOString();
        let newItems;
        if (formData.id) {
          newItems = items.map(item => item.id === formData.id ? { ...formData, updatedAt: timestamp } : item);
        } else {
          newItems = [...items, { ...formData, id: Date.now().toString(), createdAt: timestamp, updatedAt: timestamp }];
        }
        saveToLocal(newItems);
        setView('list');
      };

      const handleDelete = (id) => {
        if (window.confirm('本当にこの設定を削除しますか？')) {
          saveToLocal(items.filter(item => item.id !== id));
          setView('list');
        }
      };

      // 【修正】CSVエクスポート（カンマ対応）
      const exportCSV = () => {
        const headers = ["ブース番号", "機種", "景品名", "パワー設定", "メモ", "最終更新日"];
        const rows = items.map(i => [
          i.booth, i.machine, i.prize, i.power, i.memo, new Date(i.updatedAt).toLocaleString('ja-JP')
        ].map(val => `"${(val || '').toString().replace(/"/g, '""')}"`)); // データにカンマがあっても崩れないようにダブルクォーテーションで囲む
        
        const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + [headers.join(",")].concat(rows.map(e => e.join(","))).join("\n");
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "crane_settings.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      // 【新規】本物のCSVインポート処理
      const importCSV = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          const text = event.target.result;
          const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
          
          if (lines.length <= 1) {
            alert('データが見つかりませんでした。');
            return;
          }

          const newItems = [];
          const timestamp = new Date().toISOString();

          // 行ごとに解析
          for (let i = 1; i < lines.length; i++) {
            let cols = [];
            let current = '';
            let inQuotes = false;
            for (let char of lines[i]) {
              if (char === '"') inQuotes = !inQuotes;
              else if (char === ',' && !inQuotes) { cols.push(current); current = ''; }
              else current += char;
            }
            cols.push(current);
            cols = cols.map(c => c.replace(/^"|"$/g, '').replace(/""/g, '"').trim());

            if (cols.length >= 3 && cols[0] && cols[2]) { // 最低限ブース番号と景品名が必要
              newItems.push({
                id: Date.now().toString() + i, // かぶらないIDを生成
                booth: cols[0],
                machine: MACHINES.includes(cols[1]) ? cols[1] : MACHINES[0],
                prize: cols[2],
                power: cols[3] || '',
                memo: cols[4] || '',
                createdAt: timestamp,
                updatedAt: timestamp
              });
            }
          }

          if (newItems.length > 0) {
            if (window.confirm(`${newItems.length}件のデータを追加でインポートしますか？\n（現在のデータに上書きではなく追加されます）`)) {
              saveToLocal([...items, ...newItems]);
              alert('インポートが完了しました！');
            }
          } else {
            alert('有効なデータが読み込めませんでした。CSVの形式を確認してください。');
          }
        };
        reader.readAsText(file);
        e.target.value = ''; // 連続で同じファイルを読めるようにリセット
      };

      const filteredItems = items.filter(item => 
        item.booth.includes(searchQuery) || item.prize.includes(searchQuery)
      );

      return (
        <div className="min-h-screen bg-[#FAFAF8] text-[#2E2C29] pb-24">
          {view === 'list' && (
            <div className="p-4 max-w-md mx-auto">
              
              <div className="flex justify-between items-center mb-6">
                <h1 className="text-2xl font-bold" style={{ color: COLORS.magenta }}>設定一覧</h1>
                <div className="flex gap-2">
                  {/* インポート用隠しファイル入力 */}
                  <input type="file" id="csv-upload" style={{ display: 'none' }} accept=".csv" onChange={importCSV} />
                  <button onClick={() => document.getElementById('csv-upload').click()} className="p-2 rounded-lg bg-blue-100 text-blue-700 flex items-center gap-1 text-sm font-bold shadow-sm">
                    <IconUpload /> 読込
                  </button>
                  <button onClick={exportCSV} className="p-2 rounded-lg bg-gray-200 text-gray-700 flex items-center gap-1 text-sm font-bold shadow-sm">
                    <IconDownload /> 出力
                  </button>
                </div>
              </div>

              <div className="relative mb-6">
                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                  <IconSearch />
                </div>
                <input 
                  type="text" 
                  placeholder="ブース番号や景品名で検索..." 
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  className="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:border-[#4B6B73] focus:ring-1 focus:ring-[#4B6B73]"
                />
              </div>

              <div className="space-y-3">
                {filteredItems.length === 0 ? (
                  <p className="text-center text-gray-500 py-8">データがありません</p>
                ) : (
                  filteredItems.map(item => (
                    <div key={item.id} onClick={() => { setFormData(item); setView('form'); }} className="bg-white p-4 rounded-xl border border-[#E1DED6] shadow-sm cursor-pointer hover:shadow-md transition-shadow">
                      <div className="flex justify-between items-start mb-2">
                        <span className="bg-[#4B6B73] text-white text-xs font-bold px-2 py-1 rounded">ブース {item.booth}</span>
                        <span className="text-xs text-gray-500">{new Date(item.updatedAt).toLocaleDateString('ja-JP')}</span>
                      </div>
                      <h3 className="font-bold text-lg">{item.prize}</h3>
                      <p className="text-sm text-gray-600 mt-1">{item.machine} | パワー: {item.power || '未設定'}</p>
                    </div>
                  ))
                )}
              </div>

              <button 
                onClick={() => { setFormData({ id: null, booth: '', machine: MACHINES[0], prize: '', power: '', memo: '' }); setView('form'); }}
                className="fixed bottom-6 right-6 w-14 h-14 bg-[#4B6B73] text-white rounded-full flex items-center justify-center shadow-lg hover:scale-105 transition-transform"
              >
                <IconPlus />
              </button>
            </div>
          )}

          {view === 'form' && (
            <div className="p-4 max-w-md mx-auto">
              <div className="flex items-center justify-between mb-6">
                <button onClick={() => setView('list')} className="p-2 -ml-2 text-gray-600 hover:bg-gray-100 rounded-full">
                  <IconChevronLeft />
                </button>
                <h2 className="text-xl font-bold">{formData.id ? '設定を編集' : '新規設定登録'}</h2>
                <div className="w-10"></div>
              </div>

              <div className="space-y-4">
                <div>
                  <label className="block text-sm font-bold mb-1">ブース番号 <span className="text-red-500">*</span></label>
                  <input type="text" value={formData.booth} onChange={e => setFormData({...formData, booth: e.target.value})} className="w-full p-3 rounded-xl border border-gray-300" placeholder="例: 01" />
                </div>
                
                <div>
                  <label className="block text-sm font-bold mb-1">景品名 <span className="text-red-500">*</span></label>
                  <input type="text" value={formData.prize} onChange={e => setFormData({...formData, prize: e.target.value})} className="w-full p-3 rounded-xl border border-gray-300" placeholder="景品の名前" />
                </div>

                <div>
                  <label className="block text-sm font-bold mb-1">機種</label>
                  <select value={formData.machine} onChange={e => setFormData({...formData, machine: e.target.value})} className="w-full p-3 rounded-xl border border-gray-300 bg-white">
                    {MACHINES.map(m => <option key={m} value={m}>{m}</option>)}
                  </select>
                </div>

                <div>
                  <label className="block text-sm font-bold mb-1">パワー設定</label>
                  <input type="text" value={formData.power} onChange={e => setFormData({...formData, power: e.target.value})} className="w-full p-3 rounded-xl border border-gray-300" placeholder="例: L:30 R:30 B:40" />
                </div>

                <div>
                  <label className="block text-sm font-bold mb-1">メモ</label>
                  <textarea value={formData.memo} onChange={e => setFormData({...formData, memo: e.target.value})} className="w-full p-3 rounded-xl border border-gray-300 h-32" placeholder="設定のコツなど"></textarea>
                </div>
              </div>

              <div className="mt-8 flex gap-3">
                <button onClick={handleSave} className="flex-1 py-4 bg-[#4B6B73] text-white rounded-xl font-bold flex justify-center items-center gap-2">
                  <IconSave /> 保存する
                </button>
                {formData.id && (
                  <button onClick={() => handleDelete(formData.id)} className="px-4 py-4 bg-red-100 text-red-600 rounded-xl font-bold flex justify-center items-center">
                    <IconTrash />
                  </button>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>

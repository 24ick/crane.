<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>景品設定管理</title>
  
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#4B6B73">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="設定管理">
  <link rel="apple-touch-icon" href="./icon.svg">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
  <div id="root">
    <div style="text-align:center; padding-top: 40px; color:#8C877C; font-weight:bold;">起動中、、、</div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(err => console.log('SW failed:', err));
      });
    }
  </script>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // 安定動作用のアイコン群
    const Search = (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
    const Plus = (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
    const ChevronLeft = (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="15 18 9 12 15 6"/></svg>;
    const ChevronDown = (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="6 9 12 15 18 9"/></svg>;
    const ChevronUp = (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="18 15 12 9 6 15"/></svg>;
    const HistoryIcon = (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>;
    const Save = (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
    const Database = (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>;
    const Download = (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
    const Upload = (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
    const Loader2 = (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin" {...p}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;
    const Trash2 = (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
    const SettingsIcon = (p) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;

    // Local Storage Mock
    if (typeof window !== "undefined" && !window.storage) {
      window.storage = {
        get: async (key) => { const val = localStorage.getItem(key); return val ? { value: val } : null; },
        set: async (key, value) => { localStorage.setItem(key, value); },
        remove: async (key) => { localStorage.removeItem(key); }
      };
    }

    const COLORS = { bgVoid: "#FFFFFF", panel: "#FAFAF8", panel2: "#F1EFEA", border: "#E1DED6", magenta: "#4B6B73", magentaDim: "#E4ECEB", cyan: "#7C97A0", cyanDim: "#DEE6E4", textHi: "#2E2C29", textMid: "#8C877C", amber: "#A8763A", green: "#5F8267", screenBg: "#F2F5F4", danger: "#D9534F" };
    const MACHINES = ["クレナハイブリッド", "クレナ3Jack", "クレナ3", "クレナマルチ", "ジェミニマルチ", "ジェミニ80", "デカクレ"];
    
    // 機種判定ロジック
    function isPowerMachine(machine) { return ["クレナハイブリッド", "クレナ3Jack", "クレナ3"].includes(machine); }
    function isHybridOr3(machine) { return ["クレナハイブリッド", "クレナ3"].includes(machine); }

    function todayStr() { const d = new Date(); return new Date(d.getTime() - (d.getTimezoneOffset() * 60000)).toISOString().slice(0, 10); }
    function fmtYen(n) { return (n === null || n === undefined || Number.isNaN(n) || n === "") ? "-" : "¥" + Math.round(n).toLocaleString("ja-JP"); }
    function calcRequiredRevenue(cost, ratePercent) { const c = Number(cost), r = Number(ratePercent); return (!c || c <= 0 || !r || r <= 0) ? null : c / (r / 100); }
    function calcFlat(revenue, price) { if (!revenue || !price || price <= 0) return null; const plays = Math.ceil(revenue / price); return { plays, total: plays * price }; }
    function calcPack(revenue, single, pack, packCount) {
      if (!revenue || !single || !pack || !packCount || packCount <= 0) return null;
      for (let n = 1; n < 300000; n++) {
        const sets = Math.floor(n / packCount), rem = n % packCount, rev = sets * pack + rem * single;
        if (rev >= revenue) return { plays: n, total: rev, sets, rem };
      }
      return null;
    }
    function newId() { return "g" + Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

    // UI部品
    function Field({ label, required, children, hint }) {
      return (
        <div className="mb-4">
          <div className="flex items-baseline justify-between mb-1.5">
            <label className="text-[11px] font-bold tracking-wider uppercase" style={{ color: COLORS.textMid }}>
              {label}{required && <span style={{ color: COLORS.danger }}> *</span>}
            </label>
            {hint && <span className="text-[10px]" style={{ color: COLORS.textMid }}>{hint}</span>}
          </div>
          {children}
        </div>
      );
    }

    const inputBase = { width: "100%", background: COLORS.panel2, border: `1px solid ${COLORS.border}`, borderRadius: "8px", padding: "10px 10px", color: COLORS.textHi, fontSize: "15px", outline: "none" };
    function TextInput(props) { return <input {...props} style={{ ...inputBase, ...(props.style || {}) }} />; }
    function TextArea(props) { return <textarea {...props} style={{ ...inputBase, resize: "vertical", minHeight: "70px", ...(props.style || {}) }} />; }
    function Select({ value, onChange, options, style }) { return <select value={value} onChange={onChange} style={{ ...inputBase, appearance: "none", ...style }}>{options.map(o => <option key={o.value || o} value={o.value || o}>{o.label || o}</option>)}</select>; }
    function SectionLabel({ children }) { return <div className="text-xs font-bold uppercase tracking-widest mb-2 mt-6" style={{ color: COLORS.cyan }}>{children}</div>; }
    
    function Toggle({ label, checked, onChange }) {
      return (
        <label className="flex items-center justify-between py-3 border-b" style={{ borderColor: COLORS.border }}>
          <span className="text-sm font-bold" style={{ color: COLORS.textHi }}>{label}</span>
          <div className={`w-12 h-6 rounded-full relative transition-colors ${checked ? 'bg-[#4B6B73]' : 'bg-[#E1DED6]'}`} onClick={() => onChange(!checked)}>
            <div className={`absolute top-1/2 -translate-y-1/2 w-4 h-4 rounded-full bg-white transition-transform ${checked ? 'translate-x-7' : 'translate-x-1'}`} />
          </div>
        </label>
      );
    }

    function emptyForm() { 
      return { 
        machine: MACHINES[0], itemName: "", date: todayStr(), cost: "", rate: "", setter: "", reason: "", notes: "", 
        leftPower: "", rightPower: "", catchValue: "", topValue: "",
        armSize: "", armOpening: "100", dropLimit: "", priceSetting: "1回100円", 
        operationMethod: "ゆらころ", tagSize: "S", isPacked: "いいえ", rubberBand: "なし", rubberBandCount: "3", dataReset: "いいえ"
      }; 
    }

    // ★ 絶対に必要な計算パネル（ReadoutBox）
    function ReadoutBox({ cost, rate }) {
      const [price100, setPrice100] = useState(100);
      const [priceSingle, setPriceSingle] = useState(200);
      const [pricePack, setPricePack] = useState(500);
      const [packCount, setPackCount] = useState(3);
      const [showPriceEdit, setShowPriceEdit] = useState(false);
      
      const revenue = calcRequiredRevenue(cost, rate);
      const flat = revenue ? calcFlat(revenue, price100) : null;
      const pack = revenue ? calcPack(revenue, priceSingle, pricePack, packCount) : null;

      return (
        <div className="rounded-xl p-4 mb-4 shadow-sm" style={{ background: COLORS.screenBg, border: `1px solid ${COLORS.cyanDim}` }}>
          <div className="flex items-center justify-between mb-3">
            <span className="text-xs font-bold uppercase tracking-widest" style={{ color: COLORS.cyan }}>計算結果 (目安)</span>
            <button type="button" onClick={() => setShowPriceEdit(s => !s)} className="text-xs underline" style={{ color: COLORS.textMid }}>料金設定を編集</button>
          </div>
          
          {showPriceEdit && (
            <div className="grid grid-cols-2 gap-2 mb-3 pb-3" style={{ borderBottom: `1px solid ${COLORS.border}` }}>
              <label className="text-[10px]" style={{ color: COLORS.textMid }}>単価(通常) <TextInput type="number" value={price100} onChange={e => setPrice100(Number(e.target.value))} style={{ marginTop: 2, padding: "6px 8px", fontSize: 14 }} /></label>
              <label className="text-[10px]" style={{ color: COLORS.textMid }}>単価(パック側) <TextInput type="number" value={priceSingle} onChange={e => setPriceSingle(Number(e.target.value))} style={{ marginTop: 2, padding: "6px 8px", fontSize: 14 }} /></label>
              <label className="text-[10px]" style={{ color: COLORS.textMid }}>パック料金 <TextInput type="number" value={pricePack} onChange={e => setPricePack(Number(e.target.value))} style={{ marginTop: 2, padding: "6px 8px", fontSize: 14 }} /></label>
              <label className="text-[10px]" style={{ color: COLORS.textMid }}>パック回数 <TextInput type="number" value={packCount} onChange={e => setPackCount(Number(e.target.value))} style={{ marginTop: 2, padding: "6px 8px", fontSize: 14 }} /></label>
            </div>
          )}
          
          <div className="mb-3">
            <div className="text-[10px] mb-1" style={{ color: COLORS.textMid }}>必要売上</div>
            <div className="readout-num text-xl font-bold" style={{ color: COLORS.cyan, fontFamily: "Menlo, monospace" }}>{revenue ? fmtYen(revenue) : "-"}</div>
          </div>
          
          <div className="grid grid-cols-2 gap-3">
            <div>
              <div className="text-[10px] mb-1" style={{ color: COLORS.textMid }}>1回{price100}円なら</div>
              <div className="readout-num text-lg font-bold" style={{ color: COLORS.textHi, fontFamily: "Menlo, monospace" }}>{flat ? `約${flat.plays}回` : "-"}</div>
            </div>
            <div>
              <div className="text-[10px] mb-1" style={{ color: COLORS.textMid }}>{pricePack}円{packCount}回なら</div>
              <div className="readout-num text-lg font-bold" style={{ color: COLORS.textHi, fontFamily: "Menlo, monospace" }}>{pack ? `約${pack.plays}回` : "-"}</div>
            </div>
          </div>
        </div>
      );
    }

    // 入力フォーム本体
    function EntryFormInner({ form, setForm, onSave, onCancel, isEditing, appSettings }) {
      const [saving, setSaving] = useState(false);
      const [missingFields, setMissingFields] = useState([]);
      const [message, setMessage] = useState(null);

      const update = (patch) => setForm((f) => ({ ...f, ...patch }));
      const isPower = isPowerMachine(form.machine);
      const isHybOr3 = isHybridOr3(form.machine);
      const armOpeningOptions = [];
      for (let i = 50; i <= 100; i += 5) armOpeningOptions.push(i.toString());

      async function handleSaveClick() {
        const missing = [];
        if (!form.itemName.trim()) missing.push("景品名");
        if (!form.date) missing.push("設定日");
        if (!form.setter.trim()) missing.push("設定者");
        if (!form.cost) missing.push("原価");
        if (!form.rate) missing.push("原価率");
        if (isPower) {
          if (!form.leftPower) missing.push("左パワー");
          if (!form.rightPower) missing.push("右パワー");
        } else {
          if (!form.catchValue) missing.push("Catch");
          if (!form.topValue) missing.push("Top");
        }
        if (!form.reason.trim()) missing.push("変更理由");

        if (missing.length > 0) {
          setMissingFields(missing);
          window.scrollTo({ top: 0, behavior: 'smooth' });
          return;
        }
        setMissingFields([]); setSaving(true); setMessage(null);
        try {
          await onSave();
          if(!isEditing) { setMessage({ type: "ok", text: "保存しました。" }); setTimeout(() => setMessage(null), 3000); }
        } catch (e) { setMessage({ type: "err", text: "保存に失敗しました。" }); } finally { setSaving(false); }
      }

      return (
        <div className="pb-24">
          {missingFields.length > 0 && (
            <div className="mb-6 p-4 rounded-xl border-2 shadow-sm" style={{ borderColor: COLORS.danger, background: "#FDF0F0", color: COLORS.danger }}>
              <div className="font-bold mb-1 text-sm">【入力エラー】</div>
              <div className="text-xs">以下の必須項目を入力してください：<br/>{missingFields.join("、 ")}</div>
            </div>
          )}

          <SectionLabel>機種</SectionLabel>
          <Field label="機種" required><Select value={form.machine} onChange={e => update({ machine: e.target.value })} options={MACHINES} /></Field>
          
          <SectionLabel>基本情報</SectionLabel>
          <Field label="景品名" required><TextInput value={form.itemName} onChange={e => update({ itemName: e.target.value })} placeholder="例：ちいかわ ぬいぐるみ" /></Field>
          
          {/* 2列レイアウト：設定日と設定者 */}
          <div className="grid grid-cols-2 gap-3">
            <Field label="設定日" required><TextInput type="date" value={form.date} onChange={e => update({ date: e.target.value })} /></Field>
            <Field label="設定者" required><TextInput value={form.setter} onChange={e => update({ setter: e.target.value })} /></Field>
          </div>
          
          {/* 2列レイアウト：原価と原価率 */}
          <div className="grid grid-cols-2 gap-3">
            <Field label="原価(円)" required><TextInput type="number" inputMode="numeric" value={form.cost} onChange={e => update({ cost: e.target.value })} placeholder="0" /></Field>
            <Field label="原価率(%)" required><TextInput type="number" inputMode="numeric" value={form.rate} onChange={e => update({ rate: e.target.value })} placeholder="0" /></Field>
          </div>
          
          {/* ！！ここに計算パネルを表示！！ */}
          <ReadoutBox cost={form.cost} rate={form.rate} />

          <SectionLabel>設定値 ({isPower ? 'パワー' : 'Catch/Top'})</SectionLabel>
          {isPower ? (
            <div className="grid grid-cols-2 gap-3">
              <Field label="左パワー" required><TextInput type="number" inputMode="decimal" value={form.leftPower} onChange={e => update({ leftPower: e.target.value })} placeholder="0" /></Field>
              <Field label="右パワー" required><TextInput type="number" inputMode="decimal" value={form.rightPower} onChange={e => update({ rightPower: e.target.value })} placeholder="0" /></Field>
            </div>
          ) : (
            <>
              <div className="grid grid-cols-2 gap-3">
                <Field label="Catch" required><TextInput type="number" inputMode="decimal" value={form.catchValue} onChange={e => update({ catchValue: e.target.value })} placeholder="0" /></Field>
                <Field label="Top" required><TextInput type="number" inputMode="decimal" value={form.topValue} onChange={e => update({ topValue: e.target.value })} placeholder="0" /></Field>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <Field label="ゴム有無"><Select value={form.rubberBand} onChange={e => update({ rubberBand: e.target.value })} options={["なし", "あり"]} /></Field>
                {form.rubberBand === "あり" && <Field label="ゴム個数"><Select value={form.rubberBandCount} onChange={e => update({ rubberBandCount: e.target.value })} options={["1", "2", "3"]} /></Field>}
              </div>
            </>
          )}

          {/* その他の細かい設定を2列に詰め込む */}
          <div className="grid grid-cols-2 gap-x-3 gap-y-1">
            {appSettings.showPriceSetting && (
              <Field label="料金設定">
                <Select value={form.priceSetting} onChange={e => update({ priceSetting: e.target.value })} options={["1回100円", "1回200円", "1回200円/3回500円", "その他"]} />
                {form.priceSetting === "その他" && <TextInput placeholder="詳細..." value={form.priceSettingOther || ""} onChange={e => update({ priceSettingOther: e.target.value })} style={{marginTop: 6}} />}
              </Field>
            )}
            
            {appSettings.showOperationMethod && (
              <Field label="運営方法">
                <Select value={form.operationMethod} onChange={e => update({ operationMethod: e.target.value })} options={["ゆらころ", "タグ", "フック", "その他"]} />
                {form.operationMethod === "タグ" && <Select value={form.tagSize} onChange={e => update({ tagSize: e.target.value })} options={["S", "M", "L"]} style={{marginTop: 6}} />}
              </Field>
            )}
            
            {appSettings.showArmSize && form.machine !== "デカクレ" && (
              <Field label="アームサイズ">
                {isHybOr3 ? <Select value={form.armSize} onChange={e => update({ armSize: e.target.value })} options={["", "S", "M", "L"]} /> : <TextInput value={form.armSize} onChange={e => update({ armSize: e.target.value })} placeholder="自由記述" />}
              </Field>
            )}
            
            {appSettings.showArmOpening && isHybOr3 && (
              <Field label="アーム開度 (%)"><Select value={form.armOpening} onChange={e => update({ armOpening: e.target.value })} options={armOpeningOptions} /></Field>
            )}
            
            {appSettings.showDropLimit && isHybOr3 && (
              <Field label="下降制限(0〜80)"><TextInput type="number" inputMode="numeric" min="0" max="80" value={form.dropLimit} onChange={e => update({ dropLimit: e.target.value })} /></Field>
            )}
            
            {appSettings.showPacked && (
              <Field label="敷き詰め"><Select value={form.isPacked} onChange={e => update({ isPacked: e.target.value })} options={["いいえ", "はい"]} /></Field>
            )}
            
            {appSettings.showDataReset && (
              <Field label="データリセット？"><Select value={form.dataReset} onChange={e => update({ dataReset: e.target.value })} options={["いいえ", "はい"]} /></Field>
            )}
          </div>

          <SectionLabel>変更理由・備考</SectionLabel>
          <Field label="変更理由" required><TextArea value={form.reason} onChange={e => update({ reason: e.target.value })} /></Field>
          <Field label="備考"><TextArea value={form.notes} onChange={e => update({ notes: e.target.value })} /></Field>
          
          {message && <div className="text-sm mb-4 px-3 py-2 rounded-lg font-bold text-center" style={{ color: message.type === "ok" ? COLORS.green : COLORS.danger, background: COLORS.panel2 }}>{message.text}</div>}
          
          <div className="flex gap-2">
            {isEditing && <button type="button" onClick={onCancel} className="flex-1 py-4 rounded-xl font-bold text-sm" style={{ background: COLORS.panel2, color: COLORS.textMid }}>キャンセル</button>}
            <button type="button" disabled={saving} onClick={handleSaveClick} className="flex-1 flex items-center justify-center gap-2 py-4 rounded-xl font-bold text-base shadow-sm transition-opacity" style={{ background: COLORS.magenta, color: "#FFFFFF", opacity: saving ? 0.7 : 1 }}>
              {saving ? <Loader2 size={18} className="animate-spin" /> : <Save size={18} />} 保存する
            </button>
          </div>
        </div>
      );
    }

    // メインアプリ
    function App() {

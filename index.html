<!DOCTYPE html>
<html lang="ja">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <meta name="theme-color" content="#4B6B73">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="設定管理">
  <link rel="apple-touch-icon" href="./icon.svg">
  
  <script src="https://cdn.tailwindcss.com"></script>

<body>
  <div id="root">
    <div style="padding: 20px; font-family: sans-serif; text-align: center; color: #8C877C;">
      起動中...<br><br>
      <div id="debug-log" style="color: red; font-size: 12px; text-align: left; word-break: break-all;"></div>
    </div>
  </div>

  <script>
    // エラー監視（真っ白になるのを防ぎ、理由を表示する）
    window.onerror = function(msg, url, line) {
      document.getElementById('debug-log').innerText += "\nエラー: " + msg + " (行: " + line + ")";
    };
    window.addEventListener('unhandledrejection', function(e) {
      document.getElementById('debug-log').innerText += "\nPromiseエラー: " + (e.reason && e.reason.message ? e.reason.message : String(e.reason));
    });

    // Service Worker の登録
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(err => {
          document.getElementById('debug-log').innerText += "\nSW登録失敗: " + err;
        });
      });
    }
  </script>

  <script type="text/babel">

    };

    // ----- iOSでのlocalStorageエラー対策を含むストレージ機能 -----
    window.storage = {
      get: async (key) => { 
        try { const val = localStorage.getItem(key); return val ? { value: val } : null; } 
        catch (e) { throw new Error("保存データにアクセスできませんでした"); }
      },
      set: async (key, value) => { 
        try { localStorage.setItem(key, value); } 
        catch (e) { throw new Error("データの保存に失敗しました"); }
      }
    };

    const COLORS = { bgVoid: "#FFFFFF", panel: "#FAFAF8", panel2: "#F1EFEA", border: "#E1DED6", magenta: "#4B6B73", magentaDim: "#E4ECEB", cyan: "#7C97A0", cyanDim: "#DEE6E4", textHi: "#2E2C29", textMid: "#8C877C", amber: "#A8763A", green: "#5F8267", screenBg: "#F2F5F4" };
    const MACHINES = ["クレナハイブリッド", "クレナ3Jack", "クレナ3", "クレナマルチ", "ジェミニマルチ", "ジェミニ80", "デカクレ"];
    const MACHINE_DEFAULT_TYPE = { クレナハイブリッド: "power", "クレナ3Jack": "power", "クレナ3": "power", クレナマルチ: "power", ジェミニマルチ: "catchtop", ジェミニ80: "catchtop", デカクレ: "catchtop" };

    function todayStr() {
      const d = new Date(); return new Date(d.getTime() - (d.getTimezoneOffset() * 60000)).toISOString().slice(0, 10);
    }
    function fmtYen(n) { return (n === null || n === undefined || Number.isNaN(n)) ? "-" : "¥" + Math.round(n).toLocaleString("ja-JP"); }
    function calcRequiredRevenue(cost, ratePercent) {
      const c = Number(cost), r = Number(ratePercent); return (!c || c <= 0 || !r || r <= 0) ? null : c / (r / 100);
    }
    function calcFlat(revenue, price) {
      if (!revenue || !price || price <= 0) return null;
      const plays = Math.ceil(revenue / price); return { plays, total: plays * price };
    }
    function calcPack(revenue, single, pack, packCount) {
      if (!revenue || !single || !pack || !packCount || packCount <= 0) return null;
      for (let n = 1; n < 300000; n++) {
        const sets = Math.floor(n / packCount), rem = n % packCount, rev = sets * pack + rem * single;
        if (rev >= revenue) return { plays: n, total: rev, sets, rem };
      }
      return null;
    }

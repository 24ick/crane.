<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>景品設定管理</title>
  
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#4B6B73">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="設定管理">
  <link rel="apple-touch-icon" href="./icon.svg">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
  <div id="root">
    <div style="text-align:center; padding-top: 40px; color:#8C877C; font-weight:bold;">起動中、、、</div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(err => console.log('SW failed:', err));
      });
    }
  </script>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // オフライン耐性をMAXにするため、アイコンを外部から取得せず直接埋め込む
    const Search = ({size=24, color="currentColor", ...p}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>);
    const Plus = ({size=24, color="currentColor", ...p}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>);
    const ChevronLeft = ({size=24, color="currentColor", ...p}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="15 18 9 12 15 6"/></svg>);
    const ChevronDown = ({size=24, color="currentColor", ...p}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="6 9 12 15 18 9"/></svg>);
    const ChevronUp = ({size=24, color="currentColor", ...p}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="18 15 12 9 6 15"/></svg>);
    const History = ({size=24, color="currentColor", ...p}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>);
    const Save = ({size=24, color="currentColor", ...p}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>);
    const Database = ({size=24, color="currentColor", ...p}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>);
    const Download = ({size=24, color="currentColor", ...p}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>);
    const Upload = ({size=24, color="currentColor", ...p}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>);
    const Loader2 = ({size=24, color="currentColor", ...p}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin" {...p}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>);

    if (typeof window !== "undefined" && !window.storage) {
      window.storage = {
        get: async (key) => { const val = localStorage.getItem(key); return val ? { value: val } : null; },
        set: async (key, value) => { localStorage.setItem(key, value); }
      };
    }

    const COLORS = { bgVoid: "#FFFFFF", panel: "#FAFAF8", panel2: "#F1EFEA", border: "#E1DED6", magenta: "#4B6B73", magentaDim: "#E4ECEB", cyan: "#7C97A0", cyanDim: "#DEE6E4", textHi: "#2E2C29", textMid: "#8C877C", amber: "#A8763A", green: "#5F8267", screenBg: "#F2F5F4" };
    const MACHINES = ["クレナハイブリッド", "クレナ3Jack", "クレナ3", "クレナマルチ", "ジェミニマルチ", "ジェミニ80", "デカクレ"];
    const MACHINE_DEFAULT_TYPE = { クレナハイブリッド: "power", "クレナ3Jack": "power", "クレナ3": "power", クレナマルチ: "power", ジェミニマルチ: "catchtop", ジェミニ80: "catchtop", デカクレ: "catchtop" };

    function todayStr() {
      const d = new Date(); return new Date(d.getTime() - (d.getTimezoneOffset() * 60000)).toISOString().slice(0, 10);
    }
    function fmtYen(n) { return (n === null || n === undefined || Number.isNaN(n)) ? "-" : "¥" + Math.round(n).toLocaleString("ja-JP"); }
    function calcRequiredRevenue(cost, ratePercent) {
      const c = Number(cost), r = Number(ratePercent); return (!c || c <= 0 || !r || r <= 0) ? null : c / (r / 100);
    }
    function calcFlat(revenue, price) {
      if (!revenue || !price || price <= 0) return null;
      const plays = Math.ceil(revenue / price); return { plays, total: plays * price };
    }
    function calcPack(revenue, single, pack, packCount) {
      if (!revenue || !single || !pack || !packCount || packCount <= 0) return null;
      for (let n = 1; n < 300000; n++) {
        const sets = Math.floor(n / packCount), rem = n % packCount, rev = sets * pack + rem * single;
        if (rev >= revenue) return { plays: n, total: rev, sets, rem };
      }
      return null;
    }
    function newId() { return "g" + Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

    function Field({ label, required, children, hint }) {
      return (
        <div className="mb-4">
          <div className="flex items-baseline justify-between mb-1.5">
            <label className="text-xs font-bold tracking-wider uppercase" style={{ color: COLORS.textMid }}>{label}{required && <span style={{ color: COLORS.magenta }}> *</span>}</label>
            {hint && <span className="text-xs" style={{ color: COLORS.textMid }}>{hint}</span>}
          </div>
          {children}
        </div>
      );
    }

    const inputBase = { width: "100%", background: COLORS.panel2, border: `1px solid ${COLORS.border}`, borderRadius: "10px", padding: "10px 12px", color: COLORS.textHi, fontSize: "16px", outline: "none" };
    function TextInput(props) { return <input {...props} style={{ ...inputBase, ...(props.style || {}) }} />; }
    function TextArea(props) { return <textarea {...props} style={{ ...inputBase, resize: "vertical", minHeight: "70px", ...(props.style || {}) }} />; }
    function Select({ value, onChange, options }) { return <select value={value} onChange={onChange} style={{ ...inputBase, appearance: "none" }}>{options.map(o => <option key={o} value={o}>{o}</option>)}</select>; }
    function Segmented({ options, value, onChange }) {
      return (
        <div className="flex rounded-xl overflow-hidden" style={{ border: `1px solid ${COLORS.border}` }}>
          {options.map((opt) => {
            const active = opt.value === value;
            return <button key={opt.value} type="button" onClick={() => onChange(opt.value)} className="flex-1 py-2.5 text-sm font-bold transition-colors" style={{ background: active ? COLORS.magenta : "transparent", color: active ? "#FFFFFF" : COLORS.textMid }}>{opt.label}</button>;
          })}
        </div>
      );
    }
    function SectionLabel({ children }) { return <div className="text-xs font-bold uppercase tracking-widest mb-2 mt-6" style={{ color: COLORS.cyan }}>{children}</div>; }

    function ReadoutBox({ cost, rate }) {
      const [price100, setPrice100] = useState(100);
      const [priceSingle, setPriceSingle] = useState(200);
      const [pricePack, setPricePack] = useState(500);
      const [packCount, setPackCount] = useState(3);
      const [showPriceEdit, setShowPriceEdit] = useState(false);
      const revenue = calcRequiredRevenue(cost, rate);
      const flat = revenue ? calcFlat(revenue, price100) : null;
      const pack = revenue ? calcPack(revenue, priceSingle, pricePack, packCount) : null;

      return (
        <div className="rounded-xl p-4 mb-4" style={{ background: COLORS.screenBg, border: `1px solid ${COLORS.cyanDim}` }}>
          <div className="flex items-center justify-between mb-3">
            <span className="text-xs font-bold uppercase tracking-widest" style={{ color: COLORS.cyan }}>計算結果</span>
            <button type="button" onClick={() => setShowPriceEdit(s => !s)} className="text-xs underline" style={{ color: COLORS.textMid }}>料金設定を編集</button>
          </div>
          {showPriceEdit && (
            <div className="grid grid-cols-2 gap-2 mb-3 pb-3" style={{ borderBottom: `1px solid ${COLORS.border}` }}>
              <label className="text-xs" style={{ color: COLORS.textMid }}>単価(通常) <TextInput type="number" value={price100} onChange={e => setPrice100(Number(e.target.value))} style={{ marginTop: 4, padding: "6px 8px", fontSize: 16 }} /></label>
              <label className="text-xs" style={{ color: COLORS.textMid }}>単価(パック側) <TextInput type="number" value={priceSingle} onChange={e => setPriceSingle(Number(e.target.value))} style={{ marginTop: 4, padding: "6px 8px", fontSize: 16 }} /></label>
              <label className="text-xs" style={{ color: COLORS.textMid }}>パック料金 <TextInput type="number" value={pricePack} onChange={e => setPricePack(Number(e.target.value))} style={{ marginTop: 4, padding: "6px 8px", fontSize: 16 }} /></label>
              <label className="text-xs" style={{ color: COLORS.textMid }}>パック回数 <TextInput type="number" value={packCount} onChange={e => setPackCount(Number(e.target.value))} style={{ marginTop: 4, padding: "6px 8px", fontSize: 16 }} /></label>
            </div>
          )}
          <div className="mb-3">
            <div className="text-xs mb-1" style={{ color: COLORS.textMid }}>必要売上</div>
            <div className="readout-num text-2xl font-bold" style={{ color: COLORS.cyan, fontFamily: "Menlo, monospace" }}>{revenue ? fmtYen(revenue) : "-"}</div>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <div className="text-xs mb-1" style={{ color: COLORS.textMid }}>1回{price100}円</div>
              <div className="readout-num text-xl font-bold" style={{ color: COLORS.textHi, fontFamily: "Menlo, monospace" }}>{flat ? `${flat.plays}回` : "-"}</div>
            </div>
            <div>
              <div className="text-xs mb-1" style={{ color: COLORS.textMid }}>{pricePack}円{packCount}回</div>
              <div className="readout-num text-xl font-bold" style={{ color: COLORS.textHi, fontFamily: "Menlo, monospace" }}>{pack ? `${pack.plays}回` : "-"}</div>
            </div>
          </div>
        </div>
      );
    }

    function SettingValueFields({ settingType, values, onChange }) {
      if (settingType === "power") {
        return (
          <div className="grid grid-cols-2 gap-3">
            <Field label="左パワー" required><TextInput type="number" inputMode="decimal" value={values.leftPower} onChange={e => onChange({ ...values, leftPower: e.target.value })} placeholder="0" /></Field>
            <Field label="右パワー" required><TextInput type="number" inputMode="decimal" value={values.rightPower} onChange={e => onChange({ ...values, rightPower: e.target.value })} placeholder="0" /></Field>
          </div>
        );
      }
      return (
        <div className="grid grid-cols-2 gap-3">
          <Field label="Catch" required><TextInput type="number" inputMode="decimal" value={values.catchValue} onChange={e => onChange({ ...values, catchValue: e.target.value })} placeholder="0" /></Field>
          <Field label="Top" required><TextInput type="number" inputMode="decimal" value={values.topValue} onChange={e => onChange({ ...values, topValue: e.target.value })} placeholder="0" /></Field>
        </div>
      );
    }

    function emptyForm() { return { machine: MACHINES[0], itemName: "", date: todayStr(), cost: "", rate: "", setter: "", reason: "", notes: "", settingType: MACHINE_DEFAULT_TYPE[MACHINES[0]], leftPower: "", rightPower: "", catchValue: "", topValue: "" }; }

    function NewEntryForm({ onSaved }) {
      const [form, setForm] = useState(emptyForm());
      const [saving, setSaving] = useState(false);
      const [message, setMessage] = useState(null);

      const update = (patch) => setForm((f) => ({ ...f, ...patch }));
      const isValid = form.itemName.trim() && form.date && form.cost && form.rate && form.setter.trim() && form.reason.trim() && (form.settingType === "power" ? form.leftPower !== "" && form.rightPower !== "" : form.catchValue !== "" && form.topValue !== "");

      async function handleSave() {
        if (!isValid || saving) return;
        setSaving(true); setMessage(null);
        try {
          const id = newId();
          const version = { version: 1, createdAt: new Date().toISOString(), ...form };
          const groupObj = { id, itemName: form.itemName, machine: form.machine, versions: [version] };
          await window.storage.set(`group_${id}`, JSON.stringify(groupObj));
          let index = [];
          const res = await window.storage.get("groups_index");
          if (res && res.value) index = JSON.parse(res.value);
          const summary = { id, itemName: form.itemName, machine: form.machine, latestDate: form.date, latestSetter: form.setter, versionCount: 1, latestCost: form.cost, latestRate: form.rate };
          const newIndex = [summary, ...index];
          await window.storage.set("groups_index", JSON.stringify(newIndex));
          onSaved(newIndex); setForm(emptyForm());
          setMessage({ type: "ok", text: "保存しました。" }); setTimeout(() => setMessage(null), 3000);
        } catch (e) { setMessage({ type: "err", text: "保存に失敗しました。" }); } finally { setSaving(false); }
      }

      return (
        <div className="pb-24">
          <SectionLabel>機種</SectionLabel>
          <Field label="機種" required><Select value={form.machine} onChange={e => update({ machine: e.target.value, settingType: MACHINE_DEFAULT_TYPE[e.target.value] })} options={MACHINES} /></Field>
          <SectionLabel>基本情報</SectionLabel>
          <Field label="景品名" required><TextInput value={form.itemName} onChange={e => update({ itemName: e.target.value })} placeholder="例：ちいかわ ぬいぐるみ" /></Field>
          <div className="grid grid-cols-2 gap-3">
            <Field label="設定日" required><TextInput type="date" value={form.date} onChange={e => update({ date: e.target.value })} /></Field>
            <Field label="設定者" required><TextInput value={form.setter} onChange={e => update({ setter: e.target.value })} /></Field>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <Field label="原価 (円)" required><TextInput type="number" inputMode="numeric" value={form.cost} onChange={e => update({ cost: e.target.value })} /></Field>
            <Field label="原価率 (%)" required><TextInput type="number" inputMode="numeric" value={form.rate} onChange={e => update({ rate: e.target.value })} /></Field>
          </div>
          <ReadoutBox cost={form.cost} rate={form.rate} />
          <SectionLabel>設定値</SectionLabel>
          <Field label="タイプ" required><Segmented value={form.settingType} onChange={v => update({ settingType: v })} options={[{ value: "power", label: "左右パワー" }, { value: "catchtop", label: "Catch / Top" }]} /></Field>
          <SettingValueFields settingType={form.settingType} values={form} onChange={v => update(v)} />
          <Field label="変更理由" required><TextArea value={form.reason} onChange={e => update({ reason: e.target.value })} /></Field>
          <Field label="備考"><TextArea value={form.notes} onChange={e => update({ notes: e.target.value })} /></Field>
          {message && <div className="text-sm mb-4 px-3 py-2 rounded-lg font-bold text-center" style={{ color: message.type === "ok" ? COLORS.green : COLORS.amber, background: COLORS.panel2 }}>{message.text}</div>}
          <button type="button" disabled={!isValid || saving} onClick={handleSave} className="w-full flex items-center justify-center gap-2 py-4 rounded-xl font-bold text-base shadow-sm" style={{ background: isValid ? COLORS.magenta : COLORS.panel2, color: isValid ? "#FFFFFF" : COLORS.textMid, transition: "0.2s" }}><Save size={18} /> 保存する</button>
        </div>
      );
    }

    function HistoryItem({ version, isLatest }) {
      const [open, setOpen] = useState(isLatest);
      const revenue = calcRequiredRevenue(version.cost, version.rate);
      const flat = revenue ? calcFlat(revenue, 100) : null;

      return (
        <div className="rounded-xl mb-2 overflow-hidden" style={{ border: `1px solid ${isLatest ? COLORS.magenta : COLORS.border}`, background: COLORS.panel }}>
          <button type="button" onClick={() => setOpen(o => !o)} className="w-full flex items-center justify-between px-4 py-3">
            <div className="flex items-center gap-2">
              <span className="text-xs font-bold px-2 py-0.5 rounded-full" style={{ background: isLatest ? COLORS.magentaDim : COLORS.panel2, color: isLatest ? COLORS.magenta : COLORS.textMid }}>v{version.version}</span>
              <span className="text-sm" style={{ color: COLORS.textHi }}>{version.date}</span>
              {isLatest && <span className="text-xs" style={{ color: COLORS.cyan }}>最新</span>}
            </div>
            {open ? <ChevronUp size={16} color={COLORS.textMid} /> : <ChevronDown size={16} color={COLORS.textMid} />}
          </button>
          {open && (
            <div className="px-4 pb-4">
              <div className="text-sm mb-2" style={{ color: COLORS.textMid }}>設定者：<span style={{ color: COLORS.textHi }}>{version.setter}</span></div>
              <div className="text-sm mb-3" style={{ color: COLORS.textMid }}>変更理由：<span style={{ color: COLORS.textHi }}>{version.reason}</span></div>
              {version.notes && <div className="text-sm mb-3" style={{ color: COLORS.textMid }}>備考：<span style={{ color: COLORS.textHi }}>{version.notes}</span></div>}
              <div className="grid grid-cols-2 gap-3 mb-3">
                <div>
                  <div className="text-xs" style={{ color: COLORS.textMid }}>原価 / 原価率</div>
                  <div className="text-sm font-bold" style={{ color: COLORS.textHi }}>{fmtYen(version.cost)} / {version.rate}%</div>
                </div>
                <div>
                  <div className="text-xs" style={{ color: COLORS.textMid }}>{version.settingType === "power" ? "左パワー / 右パワー" : "Catch / Top"}</div>
                  <div className="text-sm font-bold" style={{ color: COLORS.textHi, fontFamily: "Menlo, monospace" }}>{version.settingType === "power" ? `${version.leftPower} / ${version.rightPower}` : `${version.catchValue} / ${version.topValue}`}</div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function DetailView({ groupId, onBack, onIndexUpdate }) {
      const [group, setGroup] = useState(null);
      const [loading, setLoading] = useState(true);
      const [editing, setEditing] = useState(false);
      const [form, setForm] = useState(null);
      const [saving, setSaving] = useState(false);
      const [message, setMessage] = useState(null);

      useEffect(() => {
        let cancelled = false;
        (async () => {
          setLoading(true);
          try {
            const res = await window.storage.get(`group_${groupId}`);
            if (!cancelled) setGroup(res && res.value ? JSON.parse(res.value) : null);
          } catch (e) { if (!cancelled) setGroup(null); } finally { if (!cancelled) setLoading(false); }
        })();
        return () => { cancelled = true; };
      }, [groupId]);

      function startEdit() {
        const latest = group.versions[group.versions.length - 1];
        setForm({ ...latest, date: todayStr(), reason: "", notes: latest.notes || "" });
        setEditing(true); setMessage(null);
      }

      const isValid = form && form.itemName.trim() && form.date && form.cost && form.rate && form.setter.trim() && form.reason.trim() && (form.settingType === "power" ? form.leftPower !== "" && form.rightPower !== "" : form.catchValue !== "" && form.topValue !== "");

      async function handleUpdate() {
        if (!isValid || saving) return;
        setSaving(true); setMessage(null);
        try {
          const nextVersion = group.versions.length + 1;
          const versionEntry = { version: nextVersion, createdAt: new Date().toISOString(), machine: form.machine, itemName: form.itemName, date: form.date, cost: form.cost, rate: form.rate, setter: form.setter, reason: form.reason, notes: form.notes, settingType: form.settingType, leftPower: form.leftPower, rightPower: form.rightPower, catchValue: form.catchValue, topValue: form.topValue };
          const updatedGroup = { ...group, itemName: form.itemName, machine: form.machine, versions: [...group.versions, versionEntry] };
          await window.storage.set(`group_${groupId}`, JSON.stringify(updatedGroup));

          let index = [];
          const res = await window.storage.get("groups_index");
          if (res && res.value) index = JSON.parse(res.value);
          const newIndex = index.map(g => g.id === groupId ? { ...g, itemName: form.itemName, machine: form.machine, latestDate: form.date, latestSetter: form.setter, versionCount: nextVersion, latestCost: form.cost, latestRate: form.rate } : g);
          await window.storage.set("groups_index", JSON.stringify(newIndex));

          setGroup(updatedGroup); onIndexUpdate(newIndex); setEditing(false);
          setMessage({ type: "ok", text: "更新しました。" }); setTimeout(() => setMessage(null), 3000);
        } catch (e) { setMessage({ type: "err", text: "更新に失敗しました。" }); } finally { setSaving(false); }
      }

      return (
        <div className="pb-24">
          <button type="button" onClick={onBack} className="flex items-center gap-1 text-sm mb-4 font-bold" style={{ color: COLORS.textMid }}><ChevronLeft size={16} /> 一覧へ戻る</button>
          {loading && <div className="text-sm py-8 text-center" style={{ color: COLORS.textMid }}>読み込み中…</div>}
          {!loading && !group && <div className="text-sm py-8 text-center" style={{ color: COLORS.amber }}>データが見つかりません。</div>}
          {!loading && group && !editing && (
            <>
              <div className="mb-1 text-xs font-bold uppercase tracking-widest" style={{ color: COLORS.cyan }}>{group.machine}</div>
              <h2 className="text-xl font-bold mb-4" style={{ color: COLORS.textHi }}>{group.itemName}</h2>
              <ReadoutBox cost={group.versions[group.versions.length - 1].cost} rate={group.versions[group.versions.length - 1].rate} />
              <button type="button" onClick={startEdit} className="w-full py-4 rounded-xl font-bold text-sm mb-6 shadow-sm" style={{ background: COLORS.magenta, color: "#FFFFFF" }}>この設定を更新する</button>
              <div className="flex items-center gap-2 mb-3">
                <History size={16} color={COLORS.cyan} />
                <span className="text-xs font-bold uppercase tracking-widest" style={{ color: COLORS.cyan }}>更新履歴（全{group.versions.length}件）</span>
              </div>
              {[...group.versions].reverse().map((v, i) => <HistoryItem key={v.version} version={v} isLatest={i === 0} />)}
            </>
          )}
          {!loading && group && editing && (
            <>
              <h2 className="text-lg font-bold mb-4" style={{ color: COLORS.textHi }}>設定を更新</h2>
              <Field label="機種" required><Select value={form.machine} onChange={e => setForm(f => ({ ...f, machine: e.target.value, settingType: MACHINE_DEFAULT_TYPE[e.target.value] }))} options={MACHINES} /></Field>
              <Field label="景品名" required><TextInput value={form.itemName} onChange={e => setForm(f => ({ ...f, itemName: e.target.value }))} /></Field>
              <div className="grid grid-cols-2 gap-3">
                <Field label="設定日" required><TextInput type="date" value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} /></Field>
                <Field label="設定者" required><TextInput value={form.setter} onChange={e => setForm(f => ({ ...f, setter: e.target.value }))} /></Field>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <Field label="原価 (円)" required><TextInput type="number" inputMode="numeric" value={form.cost} onChange={e => setForm(f => ({ ...f, cost: e.target.value }))} /></Field>
                <Field label="原価率 (%)" required><TextInput type="number" inputMode="numeric" value={form.rate} onChange={e => setForm(f => ({ ...f, rate: e.target.value }))} /></Field>
              </div>
              <ReadoutBox cost={form.cost} rate={form.rate} />
              <Field label="タイプ" required><Segmented value={form.settingType} onChange={v => setForm(f => ({ ...f, settingType: v }))} options={[{ value: "power", label: "左右パワー" }, { value: "catchtop", label: "Catch / Top" }]} /></Field>
              <SettingValueFields settingType={form.settingType} values={form} onChange={v => setForm(f => ({ ...f, ...v }))} />
              <Field label="変更理由" required><TextArea value={form.reason} onChange={e => setForm(f => ({ ...f, reason: e.target.value }))} /></Field>
              <Field label="備考"><TextArea value={form.notes} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))} /></Field>
              <div className="flex gap-2">
                <button type="button" onClick={() => setEditing(false)} className="flex-1 py-4 rounded-xl font-bold text-sm" style={{ background: COLORS.panel2, color: COLORS.textMid }}>キャンセル</button>
                <button type="button" disabled={!isValid || saving} onClick={handleUpdate} className="flex-1 flex items-center justify-center gap-2 py-4 rounded-xl font-bold text-sm shadow-sm" style={{ background: isValid ? COLORS.magenta : COLORS.panel2, color: isValid ? "#FFFFFF" : COLORS.textMid }}><Save size={16} /> 保存</button>
              </div>
            </>
          )}
        </div>
      );
    }

    function SearchAndList({ index, indexLoaded, onOpenGroup }) {
      const [query, setQuery] = useState("");
      const [machineFilter, setMachineFilter] = useState("すべて");
      const filtered = index.filter(g => {
        const matchesQuery = query.trim() === "" || g.itemName.toLowerCase().includes(query.trim().toLowerCase());
        const matchesMachine = machineFilter === "すべて" || g.machine === machineFilter;
        return matchesQuery && matchesMachine;
      });

      return (
        <div className="pb-24">
          <div className="mb-3 relative">
            <Search size={18} color={COLORS.textMid} style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)" }} />
            <TextInput value={query} onChange={e => setQuery(e.target.value)} placeholder="景品名で検索" style={{ paddingLeft: 42 }} />
          </div>
          <div className="mb-4"><Select value={machineFilter} onChange={e => setMachineFilter(e.target.value)} options={["すべて", ...MACHINES]} /></div>
          {indexLoaded && filtered.map(g => (
            <button key={g.id} type="button" onClick={() => onOpenGroup(g.id)} className="w-full text-left rounded-xl p-4 mb-3 shadow-sm active:scale-95 transition-transform" style={{ background: COLORS.panel, border: `1px solid ${COLORS.border}` }}>
              <div className="flex justify-between mb-1">
                <span className="text-xs font-bold uppercase" style={{ color: COLORS.cyan }}>{g.machine}</span>
                <span className="text-xs px-2 py-0.5 rounded-full" style={{ background: COLORS.panel2, color: COLORS.textMid }}>v{g.versionCount}</span>
              </div>
              <div className="font-bold mb-1 text-lg" style={{ color: COLORS.textHi }}>{g.itemName}</div>
              <div className="text-xs" style={{ color: COLORS.textMid }}>最終更新: {g.latestDate}</div>
            </button>
          ))}
        </div>
      );
    }

    function DataManager({ index, onIndexUpdate }) {
      const fileInputRef = useRef(null);
      const [message, setMessage] = useState("");

      async function exportCSV() {
        if (index.length === 0) return setMessage("データがありません。");
        let csv = "ID,機種,景品名,バージョン,設定日,原価,原価率,設定者,変更理由,備考,設定タイプ,左パワー,右パワー,Catch,Top,作成日時\n";
        for (const summary of index) {
          const gRes = await window.storage.get(`group_${summary.id}`);
          if (gRes && gRes.value) {
            const group = JSON.parse(gRes.value);
            for (const v of group.versions) {
              const row = [group.id, group.machine, group.itemName, v.version, v.date, v.cost, v.rate, v.setter, v.reason, v.notes, v.settingType, v.leftPower, v.rightPower, v.catchValue, v.topValue, v.createdAt].map(val => `"${(val || "").toString().replace(/"/g, '""')}"`).join(",");
              csv += row + "\n";
            }
          }
        }
        const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = `settings_export_${todayStr()}.csv`;
        a.click(); URL.revokeObjectURL(url);
        setMessage("ダウンロードしました。");
      }

      function parseCSV(text) {
        const result = []; let row = [], inQuotes = false, val = "";
        for (let i = 0; i < text.length; i++) {
          const c = text[i];
          if (c === '"') {
            if (inQuotes && text[i+1] === '"') { val += '"'; i++; }
            else { inQuotes = !inQuotes; }
          } else if (c === ',' && !inQuotes) { row.push(val); val = ""; }
          else if ((c === '\n' || c === '\r') && !inQuotes) {
            if (c === '\r' && text[i+1] === '\n') i++; 
            row.push(val); val = "";
            if (row.length > 1 || row[0] !== "") result.push(row);
            row = [];
          } else { val += c; }
        }
        if (row.length > 0) { row.push(val); result.push(row); }
        return result;
      }

      async function importCSV(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (evt) => {
          try {
            const rows = parseCSV(evt.target.result);
            if (rows.length < 2) throw new Error("No data");
            const groups = {};
            for (let i = 1; i < rows.length; i++) {
              const r = rows[i]; if (r.length < 16) continue;
              const [id, machine, itemName, version, date, cost, rate, setter, reason, notes, settingType, leftPower, rightPower, catchValue, topValue, createdAt] = r;
              if (!groups[id]) groups[id] = { id, machine, itemName, versions: [] };
              groups[id].versions.push({ version: Number(version), date, cost: Number(cost), rate: Number(rate), setter, reason, notes, settingType, leftPower: leftPower || "", rightPower: rightPower || "", catchValue: catchValue || "", topValue: topValue || "", createdAt });
            }
            const newIndex = [];
            for (const id in groups) {
              const group = groups[id];
              group.versions.sort((a, b) => a.version - b.version);
              await window.storage.set(`group_${id}`, JSON.stringify(group));
              const latest = group.versions[group.versions.length - 1];
              newIndex.push({ id, itemName: group.itemName, machine: group.machine, latestDate: latest.date, latestSetter: latest.setter, versionCount: latest.version, latestCost: latest.cost, latestRate: latest.rate });
            }
            newIndex.sort((a, b) => new Date(b.latestDate) - new Date(a.latestDate));
            await window.storage.set("groups_index", JSON.stringify(newIndex));
            onIndexUpdate(newIndex);
            setMessage("読み込み完了！");
          } catch (err) { setMessage("読込失敗。形式を確認してね。"); }
        };
        reader.readAsText(file);
      }

      return (
        <div className="pb-24">
          <SectionLabel>CSV出力（バックアップ）</SectionLabel>
          <button type="button" onClick={exportCSV} className="w-full flex items-center justify-center gap-2 py-4 mb-8 rounded-xl font-bold text-sm shadow-sm" style={{ background: COLORS.panel, border: `1px solid ${COLORS.border}`, color: COLORS.textHi }}>
            <Download size={18} /> エクスポート
          </button>
          <SectionLabel>CSV読込（データの復元）</SectionLabel>
          <button type="button" onClick={() => fileInputRef.current.click()} className="w-full flex items-center justify-center gap-2 py-4 rounded-xl font-bold text-sm shadow-sm" style={{ background: COLORS.magenta, color: "#FFFFFF" }}>
            <Upload size={18} /> インポート
          </button>
          <input type="file" accept=".csv" ref={fileInputRef} onChange={importCSV} className="hidden" />
          {message && <div className="text-sm mt-4 px-3 py-2 rounded-lg text-center font-bold" style={{ color: COLORS.textHi, background: COLORS.panel2 }}>{message}</div>}
        </div>
      );
    }

    function App() {
      const [tab, setTab] = useState("new");
      const [index, setIndex] = useState([]);
      const [indexLoaded, setIndexLoaded] = useState(false);
      const [openGroupId, setOpenGroupId] = useState(null);

      useEffect(() => {
        (async () => {
          try {
            const res = await window.storage.get("groups_index");
            if (res && res.value) setIndex(JSON.parse(res.value));
          } catch (e) {} finally { setIndexLoaded(true); }
        })();
      }, []);

      const handleSaved = useCallback((newIndex) => { setIndex(newIndex); }, []);

      return (
        <div className="min-h-screen relative" style={{ background: COLORS.bgVoid }}>
          <div className="max-w-md mx-auto px-4 pt-8">
            <div className="mb-6">
              <div className="text-xs font-bold tracking-widest uppercase mb-1" style={{ color: COLORS.magenta }}>Clena / Gemini </div>
              <h1 className="text-3xl font-extrabold" style={{ color: COLORS.textHi, letterSpacing: "-0.02em" }}>設定管理</h1>
            </div>
            
            {openGroupId === null && tab === "new" && <NewEntryForm onSaved={handleSaved} />}
            {openGroupId === null && tab === "search" && <SearchAndList index={index} indexLoaded={indexLoaded} onOpenGroup={setOpenGroupId} />}
            {openGroupId === null && tab === "data" && <DataManager index={index} onIndexUpdate={handleSaved} />}
            {openGroupId !== null && <DetailView groupId={openGroupId} onBack={() => setOpenGroupId(null)} onIndexUpdate={handleSaved} />}
          </div>
          
          <div className="fixed bottom-0 left-0 right-0 border-t pb-safe" style={{ background: "rgba(255, 255, 255, 0.9)", backdropFilter: "blur(10px)", borderColor: COLORS.border, zIndex: 50 }}>
            <div className="max-w-md mx-auto flex">
              <button type="button" onClick={() => {setTab("new"); setOpenGroupId(null);}} className="flex-1 flex flex-col items-center justify-center gap-1 py-3" style={{ color: tab === "new" && openGroupId === null ? COLORS.magenta : COLORS.textMid }}>
                <Plus size={20} strokeWidth={tab === "new" && openGroupId === null ? 3 : 2} />
                <span className="text-[10px] font-bold">新規</span>
              </button>
              <button type="button" onClick={() => {setTab("search"); setOpenGroupId(null);}} className="flex-1 flex flex-col items-center justify-center gap-1 py-3" style={{ color: tab === "search" && openGroupId === null ? COLORS.magenta : COLORS.textMid }}>
                <Search size={20} strokeWidth={tab === "search" && openGroupId === null ? 3 : 2} />
                <span className="text-[10px] font-bold">検索</span>
              </button>
              <button type="button" onClick={() => {setTab("data"); setOpenGroupId(null);}} className="flex-1 flex flex-col items-center justify-center gap-1 py-3" style={{ color: tab === "data" && openGroupId === null ? COLORS.magenta : COLORS.textMid }}>
                <Database size={20} strokeWidth={tab === "data" && openGroupId === null ? 3 : 2} />
                <span className="text-[10px] font-bold">データ</span>
              </button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>

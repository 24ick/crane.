<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>景品設定管理 (Cloud版)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC6C2kq1P8bP0WXNHm70QL9buXpOD8l1UU",
      authDomain: "cranegamesettings.firebaseapp.com",
      projectId: "cranegamesettings",
      storageBucket: "cranegamesettings.firebasestorage.app",
      messagingSenderId: "573594834497",
      appId: "1:573594834497:web:d4378d945f2781e24198c0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.storage = {
      get: async (key) => { try { const d = await getDoc(doc(db, "app_data", key)); return d.exists() ? { value: d.data().data } : null; } catch(e) { return null; } },
      set: async (key, value) => { await setDoc(doc(db, "app_data", key), { data: value }); },
      remove: async (key) => { await deleteDoc(doc(db, "app_data", key)); }
    };
    window.dispatchEvent(new Event('firebase-ready'));
  </script>
</head>
<body>
  <div id="root"><div class="p-8 text-center text-gray-500">読み込み中...</div></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const PASSWORD = "bncs@765";
    const COLORS = { magenta: "#4B6B73", textHi: "#2E2C29", textMid: "#8C877C", panel: "#FAFAF8", border: "#E1DED6" };
    const MACHINES = ["クレナハイブリッド", "クレナ3Jack", "クレナ3", "クレナマルチ", "ジェミニマルチ", "ジェミニ80", "デカクレ"];

    function AuthScreen({ onAuth }) {
      const [input, setInput] = useState("");
      return (
        <div className="min-h-screen flex items-center justify-center p-6 bg-white">
          <div className="w-full max-w-sm">
            <h1 className="text-xl font-bold mb-6 text-center">パスワードを入力</h1>
            <input type="password" value={input} onChange={e => setInput(e.target.value)} className="w-full p-4 rounded-xl border mb-4" placeholder="パスワード" />
            <button onClick={() => input === PASSWORD ? onAuth() : alert("パスワードが違います")} className="w-full py-4 bg-[#4B6B73] text-white rounded-xl font-bold">ログイン</button>
          </div>
        </div>
      );
    }

    function App() {
      const [ready, setReady] = useState(false);
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      
      useEffect(() => {
        if(window.storage) setReady(true);
        window.addEventListener('firebase-ready', () => setReady(true));
      }, []);

      if (!ready) return <div className="p-8 text-center">接続中...</div>;
      if (!isAuthenticated) return <AuthScreen onAuth={() => setIsAuthenticated(true)} />;

      return (
        <div className="p-6 max-w-md mx-auto">
          <h1 className="text-2xl font-bold mb-4">景品設定 (共有版)</h1>
          <p className="text-sm text-gray-500">クラウド同期中です。</p>
          <div className="mt-8 p-4 rounded-xl bg-gray-50 text-sm">
            ※以前の入力フォームや検索機能をここに配置して使ってください。
            現在はFirebase連携済みです。
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
